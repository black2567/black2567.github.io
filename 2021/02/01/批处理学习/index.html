        <h1 id="1、批量替换文件名中的字"><a href="#1、批量替换文件名中的字" class="headerlink" title="1、批量替换文件名中的字"></a>1、批量替换文件名中的字</h1><figure class="highlight bat"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line">@<span class="built_in">echo</span> off&amp;<span class="built_in">color</span> <span class="number">3</span>a&amp;<span class="built_in">set</span> c=<span class="number">0123456789</span>abcdefghijklmnopqrstuvwxyz</span><br><span class="line"></span><br><span class="line"><span class="built_in">title</span> 批量替换文件(文件夹)名</span><br><span class="line"></span><br><span class="line"><span class="built_in">echo</span>.</span><br><span class="line"></span><br><span class="line"><span class="built_in">echo</span> 此批处理可批量替换本文件所在文件夹下所有文件的文件名。</span><br><span class="line"></span><br><span class="line"><span class="built_in">echo</span>.</span><br><span class="line"><span class="built_in">echo</span>.&amp;<span class="built_in">set</span> /p strtemp1= 请输入要替换的文件(文件夹)名字符串（可替换空格）：</span><br><span class="line"></span><br><span class="line"><span class="built_in">echo</span>.&amp;<span class="built_in">set</span> /p strtemp2= 请输入替换后的文件(文件夹)名字符串（删除则直接回车）：</span><br><span class="line"></span><br><span class="line"><span class="keyword">for</span> /f &quot;delims=&quot; <span class="variable">%%i</span> <span class="keyword">in</span> (&#x27;<span class="built_in">dir</span> /s /b&#x27;) <span class="keyword">do</span> (</span><br><span class="line"><span class="built_in">setlocal</span> enabledelayedexpansion</span><br><span class="line"><span class="built_in">set</span> &quot;f=<span class="variable">%%~</span>nxi&quot;</span><br><span class="line"><span class="built_in">set</span> &quot;f1=<span class="variable">!f:%strtemp1%=%strtemp2%!</span>&quot;</span><br><span class="line"><span class="keyword">if</span> <span class="keyword">not</span> &quot;<span class="variable">%%i</span>&quot;==%<span class="number">0</span> (     </span><br><span class="line"><span class="keyword">if</span> <span class="keyword">not</span> &quot;<span class="variable">!f!</span>&quot;==&quot;<span class="variable">!f1!</span>&quot; (</span><br><span class="line">         <span class="keyword">if</span> <span class="keyword">exist</span> &quot;<span class="variable">!f1!</span>&quot; (</span><br><span class="line">            <span class="built_in">echo</span> 由于<span class="variable">!f1!</span>存在同名，<span class="variable">!f!</span> 文件名未改           ) <span class="keyword">else</span> <span class="built_in">ren</span> &quot;<span class="variable">!f!</span>&quot; &quot;<span class="variable">!f1!</span>&quot; </span><br><span class="line">     )  </span><br><span class="line">     <span class="built_in">endlocal</span></span><br><span class="line">  )</span><br><span class="line">)</span><br></pre></td></tr></table></figure>

  window.addEventListener('tabs:register', () => {

    if (activeClass) {
      let activeTab = document.querySelector(`a[href="#comment-${activeClass}"]`);
      if (activeTab) {
        activeTab.click();

  if (CONFIG.comments.storage) {
    window.addEventListener('tabs:click', event => {

      localStorage.setItem('comments_active', commentClass);
    });
  }
